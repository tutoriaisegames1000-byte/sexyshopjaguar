<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Web Star Rádio</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

*{margin:0;padding:0;box-sizing:border-box;font-family:Poppins,sans-serif;}

body{background:#0b0f1a;color:white;padding-bottom:120px;}

header{
display:flex;justify-content:space-between;align-items:center;
padding:20px 8%;background:#111827;border-bottom:1px solid #1f2937;
}

.logo{font-size:26px;font-weight:700;color:#38bdf8;}

.hero{
height:500px;
background-size:cover;
background-position:center;
position:relative;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
transition:background-image 1s ease-in-out;
}

.hero::after{
content:"";
position:absolute;
width:100%;
height:100%;
background:rgba(0,0,0,0.6);
}

.hero-content{position:relative;z-index:2;max-width:700px;}

.hero h1{font-size:52px;margin-bottom:15px;}
.hero p{font-size:20px;opacity:.9;margin-bottom:25px;}

.listen-btn{
background:#38bdf8;
border:none;
padding:15px 35px;
border-radius:40px;
font-size:18px;
cursor:pointer;
font-weight:600;
}

/* PLAYER */

.player-bar{
position:fixed;bottom:0;left:0;width:100%;
background:rgba(17,24,39,0.9);
border-top:1px solid #1f2937;
display:flex;align-items:center;justify-content:center;
padding:15px;z-index:999;
}

.play-btn{
width:120px;height:50px;border-radius:30px;
border:none;background:#38bdf8;color:#0b0f1a;
font-size:16px;cursor:pointer;font-weight:600;
}

.whatsapp{
position:fixed;right:20px;bottom:120px;
width:60px;height:60px;background:#25D366;
border-radius:50%;display:flex;align-items:center;
justify-content:center;font-size:28px;
text-decoration:none;color:white;
}

</style>

</head>

<body>

<header>
<div class="logo">WEB STAR RÁDIO</div>
</header>

<section class="hero" id="hero">
<div class="hero-content">
<h1>SINTONIA PERFEITA</h1>
<p>A rádio que toca suas músicas preferidas!</p>
<button class="listen-btn" onclick="togglePlay()" id="mainBtn">OUVIR AGORA</button>
</div>
</section>

<div class="player-bar">
<button class="play-btn" onclick="togglePlay()" id="playBtn">OUVIR AGORA</button>
</div>

<audio id="radio" preload="auto">
<source src="https://stream.zeno.fm/6zb6ag59xy8uv">
</audio>

<a class="whatsapp" href="https://wa.me/5577988361857" target="_blank">💬</a>

<script>

/* SLIDER */

const slides = [
"https://raw.githubusercontent.com/sexyshopjaguar/SlideWebStarRadio/main/Slider1.jpg",
"https://raw.githubusercontent.com/sexyshopjaguar/SlideWebStarRadio/main/Slider2.jpg",
"https://raw.githubusercontent.com/sexyshopjaguar/SlideWebStarRadio/main/Slider3.jpg",
"https://raw.githubusercontent.com/sexyshopjaguar/SlideWebStarRadio/main/Slider4.jpg"
]

let hero = document.getElementById("hero")
let index = 0

function trocarSlide(){
hero.style.backgroundImage = "url('" + slides[index] + "')"
index++
if(index >= slides.length){ index = 0 }
}

trocarSlide()
setInterval(trocarSlide,5000)

/* PLAYER */

const radio = document.getElementById("radio")
const playBtn = document.getElementById("playBtn")
const mainBtn = document.getElementById("mainBtn")

let playing = false
let started = false

function atualizarBotoes(){
if(playing){
playBtn.innerHTML = "PAUSAR"
mainBtn.innerHTML = "PAUSAR"
}else{
playBtn.innerHTML = "OUVIR AGORA"
mainBtn.innerHTML = "OUVIR AGORA"
}
}

function playRadio(){
radio.play().then(()=>{
playing = true
started = true
atualizarBotoes()
}).catch(()=>{})
}

function togglePlay(){
if(!playing){
playRadio()
}else{
radio.pause()
playing = false
atualizarBotoes()
}
}

/* 🔥 AUTOPLAY PROFISSIONAL */

function tentarAutoplay(){
radio.muted = true

radio.play().then(()=>{
// começou mudo → ativa som
radio.muted = false
playing = true
started = true
atualizarBotoes()
}).catch(()=>{
// bloqueado → espera interação
})
}

tentarAutoplay()

/* fallback: primeiro toque ativa */

document.addEventListener("click", () => {
if(!started){
playRadio()
}
}, { once:true })

</script>

</body>
</html>
