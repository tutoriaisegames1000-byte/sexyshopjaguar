<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Slide Web Star Radio</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}

body{
background:#000;
color:white;
}

.hero{
position:relative;
height:500px;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
overflow:hidden;
}

.hero::before{
content:"";
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
background-size:cover;
background-position:center;
transition:background-image 1s ease-in-out;
z-index:1;
}

.overlay{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.5);
z-index:2;
}

.hero h1{
position:relative;
z-index:3;
font-size:60px;
letter-spacing:3px;
}

</style>
</head>

<body>

<section class="hero" id="hero">

<div class="overlay"></div>

<h1>SINTONIA PERFEITA</h1>

</section>

<script>

const images = [
"https://raw.githubusercontent.com/SEU-USUARIO/SlideWebStarRadio/main/Slider1.jpg",
"https://raw.githubusercontent.com/SEU-USUARIO/SlideWebStarRadio/main/Slider2.jpg",
"https://raw.githubusercontent.com/SEU-USUARIO/SlideWebStarRadio/main/Slider3.jpg",
"https://raw.githubusercontent.com/SEU-USUARIO/SlideWebStarRadio/main/Slider4.jpg"
];

let index = 0;

const hero = document.querySelector(".hero");

function changeBackground(){

hero.style.setProperty(
"--bg",
`url(${images[index]})`
);

hero.style.setProperty(
"background-image",
`url(${images[index]})`
);

index++;

if(index >= images.length){
index = 0;
}

}

changeBackground();

setInterval(changeBackground,4000);

</script>

</body>
</html>
