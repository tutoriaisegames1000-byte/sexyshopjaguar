<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Web Star Radio</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}

body{
background:#000;
color:white;
}

/* AREA DO SLIDE */

.hero{
position:relative;
height:500px;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
overflow:hidden;
background-size:cover;
background-position:center;
transition:background-image 1s ease-in-out;
}

/* camada escura */

.overlay{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.5);
z-index:1;
}

/* TEXTO */

.hero h1{
position:relative;
z-index:2;
font-size:60px;
letter-spacing:4px;
font-weight:bold;
}

</style>
</head>

<body>

<section class="hero" id="hero">

<div class="overlay"></div>

<h1>SINTONIA PERFEITA</h1>

</section>


<script>

/* IMAGENS DO GITHUB */

const images = [

"https://raw.githubusercontent.com/sexyshopjaguar/SlideWebStarRadio/main/Slider1.jpg",

"https://raw.githubusercontent.com/sexyshopjaguar/SlideWebStarRadio/main/Slider2.jpg",

"https://raw.githubusercontent.com/sexyshopjaguar/SlideWebStarRadio/main/Slider3.jpg",

"https://raw.githubusercontent.com/sexyshopjaguar/SlideWebStarRadio/main/Slider4.jpg"

];

let index = 0;

const hero = document.getElementById("hero");

function trocarImagem(){

hero.style.backgroundImage = "url('" + images[index] + "')";

index++;

if(index >= images.length){
index = 0;
}

}

/* primeira imagem */
trocarImagem();

/* troca a cada 4 segundos */

setInterval(trocarImagem,4000);

</script>

</body>
</html>
