<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Web Star Rádio</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

*{margin:0;padding:0;box-sizing:border-box;font-family:Poppins,sans-serif;}

body{background:#0b0f1a;color:white;padding-bottom:120px;}

header{
display:flex;
flex-direction:column;
align-items:flex-start;
padding:20px 8%;
background:#111827;
border-bottom:1px solid #1f2937;
}

.logo{
font-size:26px;
font-weight:700;
color:#38bdf8;
}

.subtitle{
font-size:14px;
opacity:0.7;
margin-top:4px;
}

/* HERO */

.hero{
height:500px;
background-size:cover;
background-position:center;
position:relative;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
transition:background-image 1s ease-in-out;
}

.hero::after{
content:"";
position:absolute;
width:100%;
height:100%;
background:rgba(0,0,0,0.6);
}

.hero-content{position:relative;z-index:2;max-width:700px;}

.hero h1{font-size:52px;margin-bottom:15px;}
.hero p{font-size:20px;opacity:.9;margin-bottom:25px;}

/* PLAYER */

.player-bar{
position:fixed;bottom:0;left:0;width:100%;
background:rgba(17,24,39,0.9);
border-top:1px solid #1f2937;
display:flex;align-items:center;justify-content:center;
padding:15px;z-index:999;
}

/* BOTÃO COM ANIMAÇÃO */

.play-btn{
width:150px;
height:50px;
border-radius:30px;
border:none;
background:#38bdf8;
color:#0b0f1a;
font-size:16px;
cursor:pointer;
font-weight:600;
transition:0.3s;
position:relative;
}

/* efeito hover */

.play-btn:hover{
transform:scale(1.05);
}

/* 🔥 animação de pulso */

.playing{
animation:pulse 1.2s infinite;
box-shadow:0 0 0 rgba(56,189,248,0.7);
}

@keyframes pulse{
0%{
transform:scale(1);
box-shadow:0 0 0 0 rgba(56,189,248,0.7);
}
70%{
transform:scale(1.08);
box-shadow:0 0 20px 15px rgba(56,189,248,0);
}
100%{
transform:scale(1);
box-shadow:0 0 0 0 rgba(56,189,248,0);
}
}

/* WHATSAPP */

.whatsapp{
position:fixed;
right:20px;
bottom:120px;
width:60px;
height:60px;
background:#25D366;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-size:28px;
text-decoration:none;
color:white;
}

</style>

</head>

<body>

<header>
<div class="logo">WEB STAR RÁDIO</div>
<div class="subtitle">por Renato Oliviera.</div>
</header>

<section class="hero" id="hero">
<div class="hero-content">
<h1>SINTONIA PERFEITA</h1>
<p>A rádio que toca suas músicas preferidas e as principais notícias de Cascavel e região!</p>
</div>
</section>

<div class="player-bar">
<button class="play-btn" onclick="togglePlay()" id="playBtn">OUVIR AGORA</button>
</div>

<audio id="radio">
<source src="https://stream.zeno.fm/6zb6ag59xy8uv">
</audio>

<a class="whatsapp" href="https://wa.me/5577988361857" target="_blank">💬</a>

<script>

/* SLIDER */

const slides = [
"SlideWebStarRadio/Slider1.jpg",
"SlideWebStarRadio/Slider2.jpg",
"SlideWebStarRadio/Slider3.jpg",
"SlideWebStarRadio/Slider4.jpg"
]

let hero = document.getElementById("hero")
let index = 0

function trocarSlide(){
hero.style.backgroundImage = `url(${slides[index]})`
index = (index + 1) % slides.length
}

trocarSlide()
setInterval(trocarSlide, 4000)

/* PLAYER COM ANIMAÇÃO */

const radio = document.getElementById("radio")
const playBtn = document.getElementById("playBtn")

let playing = false

function togglePlay(){
if(!playing){
radio.play()
playBtn.innerHTML="PAUSAR"
playBtn.classList.add("playing") // ativa animação
playing=true
}else{
radio.pause()
playBtn.innerHTML="OUVIR AGORA"
playBtn.classList.remove("playing") // remove animação
playing=false
}
}

</script>

</body>
</html>
