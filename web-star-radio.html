<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Web Star Rádio</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins,sans-serif;
}

body{
background:#0b0f1a;
color:white;
padding-bottom:120px;
}

/* HEADER */

header{
display:flex;
justify-content:space-between;
align-items:center;
padding:20px 8%;
background:#111827;
border-bottom:1px solid #1f2937;
}

.logo{
font-size:22px;
font-weight:700;
}

/* HERO */

.hero{
height:500px;
background-size:cover;
background-position:center;
background-repeat:no-repeat;
position:relative;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
transition:background-image 1s ease-in-out;
}

.hero::after{
content:"";
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.5);
}

.hero-content{
position:relative;
z-index:2;
max-width:700px;
}

.hero h1{
font-size:48px;
font-weight:700;
margin-bottom:10px;
}

.hero p{
opacity:.9;
margin-bottom:20px;
}

.listen-btn{
padding:12px 25px;
background:#ff004c;
border:none;
border-radius:5px;
color:white;
font-weight:600;
cursor:pointer;
}

/* SPONSORS */

.sponsors{
margin-top:40px;
overflow:hidden;
}

.sponsor-track{
display:flex;
gap:40px;
animation:scroll 20s linear infinite;
}

.sponsor img{
height:130px;
width:auto;
border-radius:6px;
}

/* ANIMAÇÃO */

@keyframes scroll{
0%{transform:translateX(0)}
100%{transform:translateX(-50%)}
}

/* FOOTER */

footer{
background:#111827;
padding:50px 8%;
margin-top:80px;
text-align:center;
}

.footer-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:30px;
justify-items:center;
}

.footer-title{
font-weight:700;
margin-bottom:10px;
}

.footer-grid a{
color:white;
text-decoration:none;
}

.footer-grid a:hover{
text-decoration:underline;
}

.copy{
text-align:center;
margin-top:30px;
opacity:.7;
}

</style>
</head>

<body>

<header>

<div class="logo">WEB STAR RÁDIO</div>

</header>

<section class="hero" id="hero">

<div class="hero-content">
<h1>SINTONIA PERFEITA</h1>
<p>A rádio que toca suas músicas preferidas e as principais notícias de Cascavel e região!</p>
<button class="listen-btn" onclick="playRadio()">OUVIR AGORA</button>
</div>

</section>

<footer>

<div class="footer-grid">

<div>
<div class="footer-title">CONTATO</div>
<div>
<a href="https://wa.me/5577988361857" target="_blank">(77) 98836-1857</a>
</div>
<div>webstarradio@gmail.com</div>
</div>

<div>
<div class="footer-title">REDES SOCIAIS</div>
<div>Instagram: @WebStarRadio</div>
<div>Facebook: Web Star Radio</div>
</div>

</div>

<div class="copy">
© 2026 Web Star Rádio. Todos os direitos reservados.
</div>

</footer>

<script>

/* SLIDER COM IMAGENS DO GITHUB */

const slides = [

"https://raw.githubusercontent.com/sexyshopjaguar/SlideWebStarRadio/main/Slider1.jpg",
"https://raw.githubusercontent.com/sexyshopjaguar/SlideWebStarRadio/main/Slider2.jpg",
"https://raw.githubusercontent.com/sexyshopjaguar/SlideWebStarRadio/main/Slider3.jpg",
"https://raw.githubusercontent.com/sexyshopjaguar/SlideWebStarRadio/main/Slider4.jpg"

]

let hero = document.getElementById("hero")
let index = 0

function trocarSlide(){

hero.style.backgroundImage = "url('" + slides[index] + "')"

index++

if(index >= slides.length){
index = 0
}

}

trocarSlide()

setInterval(trocarSlide,5000)

/* PLAYER */

function playRadio(){

const radio = new Audio("https://stream.zeno.fm/YOUR_STREAM")

radio.play()

}

</script>

</body>
</html>
